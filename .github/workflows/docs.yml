name: docs

# Build the MkDocs site on every push, and publish it to GitHub Pages from the default branch.
#
# One-time setup on the GitHub side: Settings -> Pages -> Build and deployment -> Source:
# "GitHub Actions". No gh-pages branch, no personal token needed.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Let a running deploy finish; queue at most one more.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install docs toolchain
        run: pip install -r requirements-docs.txt

      - name: Build site
        # --strict turns broken internal links and bad references into build failures.
        run: mkdocs build --strict

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    # Only publish from the default branch; PRs just get the build check above.
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
